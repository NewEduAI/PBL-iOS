name: Build & Release DMG

on:
  push:
    branches: [main]

concurrency:
  group: build-dmg
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          sw_vers

      - name: Resolve SPM dependencies
        run: xcodebuild -project PBL.xcodeproj -scheme "PBL Zone" -resolvePackageDependencies

      - name: Generate next version tag
        id: tag
        run: |
          git fetch --tags
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Download Sparkle tools
        run: |
          curl -L -o /tmp/Sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz"
          mkdir -p /tmp/sparkle
          tar xf /tmp/Sparkle.tar.xz -C /tmp/sparkle

      - name: Build DMG
        run: |
          SHORT_VERSION="${{ steps.tag.outputs.version }}"
          ./scripts/build_dmg.sh "${SHORT_VERSION#v}"

      - name: Sign DMG with Sparkle key
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # sign_update reads the key from env var SPARKLE_KEY or a file
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          SIGN_OUTPUT=$(/tmp/sparkle/bin/sign_update build/PBLZone.dmg -f /tmp/sparkle_key)
          rm /tmp/sparkle_key
          echo "Signature output: $SIGN_OUTPUT"
          # Extract edSignature and length
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          LENGTH=$(echo "$SIGN_OUTPUT" | grep -o 'length="[^"]*"' | cut -d'"' -f2)
          echo "signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          gh release create "${{ steps.tag.outputs.version }}" \
            build/PBLZone.dmg \
            --title "PBL Zone ${{ steps.tag.outputs.version }}" \
            --notes "**${{ steps.tag.outputs.version }}** (${{ steps.tag.outputs.short_sha }}): ${COMMIT_MSG}" \
            --latest

      - name: Deploy appcast and changelog to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.tag.outputs.version }}
          NEW_SIGNATURE: ${{ steps.sign.outputs.signature }}
          NEW_LENGTH: ${{ steps.sign.outputs.length }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Use Python to rebuild everything from GitHub API + new release
          python3 << 'PYSCRIPT'
          import json, os, re, urllib.request

          new_tag = os.environ["NEW_VERSION"]
          new_ver = new_tag.lstrip("v")
          new_sig = os.environ["NEW_SIGNATURE"]
          new_len = os.environ["NEW_LENGTH"]
          gh_token = os.environ.get("GH_TOKEN", "")

          def gh_api(url):
              req = urllib.request.Request(url)
              if gh_token:
                  req.add_header("Authorization", f"token {gh_token}")
              return json.loads(urllib.request.urlopen(req).read())

          # Fetch all releases from GitHub API
          releases = gh_api("https://api.github.com/repos/NewEduAI/PBL-iOS/releases")
          v_releases = sorted(
              [r for r in releases if r["tag_name"].startswith("v")],
              key=lambda r: [int(x) for x in r["tag_name"][1:].split(".")],
              reverse=True
          )

          # Get existing signatures from appcast
          sigs = {}
          if os.path.exists("appcast.xml"):
              with open("appcast.xml") as f:
                  old = f.read()
              for ver, sig, length in re.findall(
                  r'<sparkle:version>([^<]+)</sparkle:version>.*?sparkle:edSignature="([^"]*)".*?length="([^"]*)"',
                  old, re.DOTALL
              ):
                  sigs[ver] = (sig, length)
          # Add new release signature
          sigs[new_ver] = (new_sig, new_len)

          # Build versions list with commit messages from GitHub compare API
          versions = []
          for idx, r in enumerate(v_releases):
              tag = r["tag_name"]
              ver = tag[1:]
              if ver not in sigs:
                  continue
              # Get commits for this version
              if idx < len(v_releases) - 1:
                  prev_tag = v_releases[idx + 1]["tag_name"]
                  try:
                      data = gh_api(
                          f"https://api.github.com/repos/NewEduAI/PBL-iOS/compare/{prev_tag}...{tag}"
                      )
                      commits = [c["commit"]["message"].split("\n")[0] for c in data.get("commits", [])]
                  except:
                      commits = []
              else:
                  try:
                      data = gh_api(
                          f"https://api.github.com/repos/NewEduAI/PBL-iOS/commits?sha={tag}&per_page=5"
                      )
                      commits = [c["commit"]["message"].split("\n")[0] for c in data]
                  except:
                      commits = []

              if not commits:
                  body = r.get("body", "") or ""
                  if ": " in body:
                      commits = [body.split(": ", 1)[1].strip()]

              commits_html = ""
              for msg in commits:
                  if not msg: continue
                  msg = msg.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")
                  commits_html += f"<li>{msg}</li>"

              versions.append({
                  "version": ver,
                  "date": r["published_at"],
                  "commits": commits_html
              })

          # Save versions.json
          with open("versions.json", "w") as f:
              json.dump(versions, f, indent=2)

          # Build clean appcast.xml
          appcast = '<?xml version="1.0" encoding="utf-8"?>\n'
          appcast += '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">\n'
          appcast += '  <channel>\n'
          appcast += '    <title>PBL Zone Updates</title>\n'
          appcast += '    <language>en</language>\n'
          for r in v_releases:
              ver = r["tag_name"][1:]
              if ver not in sigs: continue
              sig, length = sigs[ver]
              appcast += f'    <item>\n'
              appcast += f'      <title>Version {ver}</title>\n'
              appcast += f'      <sparkle:version>{ver}</sparkle:version>\n'
              appcast += f'      <sparkle:shortVersionString>{ver}</sparkle:shortVersionString>\n'
              appcast += f'      <sparkle:releaseNotesLink>https://neweduai.github.io/PBL-iOS/changelog.html</sparkle:releaseNotesLink>\n'
              appcast += f'      <pubDate>{r["published_at"]}</pubDate>\n'
              appcast += f'      <enclosure\n'
              appcast += f'        url="https://github.com/NewEduAI/PBL-iOS/releases/download/{r["tag_name"]}/PBLZone.dmg"\n'
              appcast += f'        sparkle:edSignature="{sig}"\n'
              appcast += f'        length="{length}"\n'
              appcast += f'        type="application/octet-stream"\n'
              appcast += f'      />\n'
              appcast += f'    </item>\n'
          appcast += '  </channel>\n'
          appcast += '</rss>\n'
          with open("appcast.xml", "w") as f:
              f.write(appcast)

          # Build changelog.html
          html = """<html>
          <head>
          <style>
            body {
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
              padding: 20px 24px; color: #1d1d1f; background: #fff; line-height: 1.6; max-width: 600px;
            }
            .version-card { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #e5e5e5; }
            .version-card:last-child { border-bottom: none; }
            .version-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
            h2 { font-size: 17px; font-weight: 600; margin: 0; color: #1d1d1f; }
            .badge { font-size: 11px; font-weight: 500; color: #fff; background: #007aff; padding: 2px 8px; border-radius: 10px; }
            .date { font-size: 12px; color: #86868b; margin-bottom: 10px; }
            ul { padding-left: 18px; margin: 0; }
            li { font-size: 13px; margin-bottom: 5px; color: #333; }
          </style>
          </head>
          <body>
          """
          for i, v in enumerate(versions):
              badge = ' <span class="badge">LATEST</span>' if i == 0 else ''
              html += f'<div class="version-card">\n'
              html += f'  <div class="version-header"><h2>v{v["version"]}</h2>{badge}</div>\n'
              html += f'  <div class="date">{v["date"]}</div>\n'
              if v["commits"]:
                  html += f'  <ul>{v["commits"]}</ul>\n'
              html += f'</div>\n'
          html += "</body></html>"
          with open("changelog.html", "w") as f:
              f.write(html)

          print(f"Updated: {len(versions)} versions in changelog")
          PYSCRIPT

          git add appcast.xml changelog.html versions.json
          git commit -m "Update appcast for ${NEW_VERSION}" || true
          git push origin gh-pages
