name: Build & Release DMG

on:
  push:
    branches: [main]

concurrency:
  group: build-dmg
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          sw_vers

      - name: Resolve SPM dependencies
        run: xcodebuild -project PBL.xcodeproj -scheme "PBL Zone" -resolvePackageDependencies

      - name: Download Sparkle tools
        run: |
          curl -L -o /tmp/Sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz"
          mkdir -p /tmp/sparkle
          tar xf /tmp/Sparkle.tar.xz -C /tmp/sparkle

      - name: Build DMG
        run: ./scripts/build_dmg.sh

      - name: Generate next version tag
        id: tag
        run: |
          git fetch --tags
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Sign DMG with Sparkle key
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # sign_update reads the key from env var SPARKLE_KEY or a file
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          SIGN_OUTPUT=$(/tmp/sparkle/bin/sign_update build/PBLZone.dmg -f /tmp/sparkle_key)
          rm /tmp/sparkle_key
          echo "Signature output: $SIGN_OUTPUT"
          # Extract edSignature and length
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          LENGTH=$(echo "$SIGN_OUTPUT" | grep -o 'length="[^"]*"' | cut -d'"' -f2)
          echo "signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          gh release create "${{ steps.tag.outputs.version }}" \
            build/PBLZone.dmg \
            --title "PBL Zone ${{ steps.tag.outputs.version }}" \
            --notes "**${{ steps.tag.outputs.version }}** (${{ steps.tag.outputs.short_sha }}): ${COMMIT_MSG}" \
            --latest

      - name: Get commit messages since last tag
        id: changes
        run: |
          git fetch --tags
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            COMMITS=$(git log --pretty=format:"%s" -10)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LATEST}..HEAD")
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commits<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Generate release notes and appcast item
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          SHORT_VERSION="${VERSION#v}"
          SIGNATURE="${{ steps.sign.outputs.signature }}"
          LENGTH="${{ steps.sign.outputs.length }}"
          DMG_URL="https://github.com/NewEduAI/PBL-iOS/releases/download/${VERSION}/PBLZone.dmg"
          PUB_DATE="$(date -R)"

          # Save this version's notes as a JSON entry for the combined changelog
          mkdir -p /tmp/release-data
          COMMITS_HTML=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            ESCAPED=$(echo "$line" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            COMMITS_HTML="${COMMITS_HTML}<li>${ESCAPED}</li>"
          done <<< "${{ steps.changes.outputs.commits }}"

          # Store version data for changelog generation
          cat > /tmp/release-data/current.json << DATEOF
          {"version":"${SHORT_VERSION}","date":"${PUB_DATE}","commits":"${COMMITS_HTML}"}
          DATEOF

          # Build the appcast <item> — releaseNotesLink points to combined changelog
          cat > /tmp/new_item.xml << ITEM_EOF
              <item>
                <title>Version ${SHORT_VERSION}</title>
                <sparkle:version>${SHORT_VERSION}</sparkle:version>
                <sparkle:shortVersionString>${SHORT_VERSION}</sparkle:shortVersionString>
                <sparkle:releaseNotesLink>https://neweduai.github.io/PBL-iOS/changelog.html</sparkle:releaseNotesLink>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure
                  url="${DMG_URL}"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${LENGTH}"
                  type="application/octet-stream"
                />
              </item>
          ITEM_EOF

      - name: Deploy appcast and changelog to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          SHORT_VERSION="${VERSION#v}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Create appcast if it doesn't exist
          if [ ! -f appcast.xml ]; then
            cat > appcast.xml << 'HEADER'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>PBL Zone Updates</title>
              <language>en</language>
            </channel>
          </rss>
          HEADER
          fi

          # Insert new item before </channel>
          sed -i '' '/<\/channel>/r /tmp/new_item.xml' appcast.xml

          # Read current version data
          CURRENT_VERSION=$(cat /tmp/release-data/current.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['version'])")
          CURRENT_DATE=$(cat /tmp/release-data/current.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['date'])")
          CURRENT_COMMITS=$(cat /tmp/release-data/current.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['commits'])")

          # Append new version entry to versions.json (accumulates history)
          if [ ! -f versions.json ]; then
            echo "[]" > versions.json
          fi
          python3 -c "
          import json, sys
          with open('versions.json') as f:
              versions = json.load(f)
          versions.insert(0, {
              'version': '${CURRENT_VERSION}',
              'date': '${CURRENT_DATE}',
              'commits': '''${CURRENT_COMMITS}'''
          })
          with open('versions.json', 'w') as f:
              json.dump(versions, f, indent=2)
          "

          # Generate combined changelog.html from all versions
          cat > changelog.html << 'HTML_HEAD'
          <html>
          <head>
          <style>
            body {
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
              padding: 20px 24px;
              color: #1d1d1f;
              background: #fff;
              line-height: 1.6;
              max-width: 600px;
            }
            .version-card {
              margin-bottom: 24px;
              padding-bottom: 20px;
              border-bottom: 1px solid #e5e5e5;
            }
            .version-card:last-child {
              border-bottom: none;
            }
            .version-header {
              display: flex;
              align-items: baseline;
              gap: 10px;
              margin-bottom: 8px;
            }
            h2 {
              font-size: 17px;
              font-weight: 600;
              margin: 0;
              color: #1d1d1f;
            }
            .badge {
              font-size: 11px;
              font-weight: 500;
              color: #fff;
              background: #007aff;
              padding: 2px 8px;
              border-radius: 10px;
            }
            .date {
              font-size: 12px;
              color: #86868b;
              margin-bottom: 10px;
            }
            ul {
              padding-left: 18px;
              margin: 0;
            }
            li {
              font-size: 13px;
              margin-bottom: 5px;
              color: #333;
            }
          </style>
          </head>
          <body>
          HTML_HEAD

          # Build version cards from versions.json
          python3 -c "
          import json
          with open('versions.json') as f:
              versions = json.load(f)
          for i, v in enumerate(versions):
              badge = ' <span class=\"badge\">LATEST</span>' if i == 0 else ''
              print(f'<div class=\"version-card\">')
              print(f'  <div class=\"version-header\"><h2>v{v[\"version\"]}</h2>{badge}</div>')
              print(f'  <div class=\"date\">{v[\"date\"]}</div>')
              print(f'  <ul>{v[\"commits\"]}</ul>')
              print(f'</div>')
          " >> changelog.html

          echo "</body></html>" >> changelog.html

          git add appcast.xml changelog.html versions.json
          git commit -m "Update appcast for ${VERSION}" || true
          git push origin gh-pages
