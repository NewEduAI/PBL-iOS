name: Build & Release DMG

on:
  push:
    branches: [main]

concurrency:
  group: build-dmg
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          sw_vers

      - name: Resolve SPM dependencies
        run: xcodebuild -project PBL.xcodeproj -scheme "PBL Zone" -resolvePackageDependencies

      - name: Download Sparkle tools
        run: |
          curl -L -o /tmp/Sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz"
          mkdir -p /tmp/sparkle
          tar xf /tmp/Sparkle.tar.xz -C /tmp/sparkle

      - name: Build DMG
        run: ./scripts/build_dmg.sh

      - name: Generate next version tag
        id: tag
        run: |
          git fetch --tags
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Sign DMG with Sparkle key
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # sign_update reads the key from env var SPARKLE_KEY or a file
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          SIGN_OUTPUT=$(/tmp/sparkle/bin/sign_update build/PBLZone.dmg -f /tmp/sparkle_key)
          rm /tmp/sparkle_key
          echo "Signature output: $SIGN_OUTPUT"
          # Extract edSignature and length
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          LENGTH=$(echo "$SIGN_OUTPUT" | grep -o 'length="[^"]*"' | cut -d'"' -f2)
          echo "signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          gh release create "${{ steps.tag.outputs.version }}" \
            build/PBLZone.dmg \
            --title "PBL Zone ${{ steps.tag.outputs.version }}" \
            --notes "**${{ steps.tag.outputs.version }}** (${{ steps.tag.outputs.short_sha }}): ${COMMIT_MSG}" \
            --latest

      - name: Get commit messages since last tag
        id: changes
        run: |
          git fetch --tags
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            COMMITS=$(git log --pretty=format:"%s" -10)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LATEST}..HEAD")
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commits<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Generate release notes HTML and appcast item
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          SHORT_VERSION="${VERSION#v}"
          SIGNATURE="${{ steps.sign.outputs.signature }}"
          LENGTH="${{ steps.sign.outputs.length }}"
          DMG_URL="https://github.com/NewEduAI/PBL-iOS/releases/download/${VERSION}/PBLZone.dmg"
          NOTES_URL="https://neweduai.github.io/PBL-iOS/notes/${SHORT_VERSION}.html"
          PUB_DATE="$(date -R)"

          # Generate styled HTML release notes for this version
          mkdir -p /tmp/release-notes
          cat > /tmp/release-notes/${SHORT_VERSION}.html << 'STYLE_EOF'
          <html>
          <head>
          <style>
            body {
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
              padding: 16px 20px;
              color: #1d1d1f;
              background: #fff;
              line-height: 1.6;
            }
            h2 {
              font-size: 18px;
              font-weight: 600;
              margin: 0 0 4px 0;
              color: #1d1d1f;
            }
            .date {
              font-size: 12px;
              color: #86868b;
              margin-bottom: 12px;
            }
            ul {
              padding-left: 20px;
              margin: 0;
            }
            li {
              font-size: 13px;
              margin-bottom: 6px;
              color: #333;
            }
          </style>
          </head>
          <body>
          STYLE_EOF

          echo "<h2>Version ${SHORT_VERSION}</h2>" >> /tmp/release-notes/${SHORT_VERSION}.html
          echo "<div class=\"date\">${PUB_DATE}</div>" >> /tmp/release-notes/${SHORT_VERSION}.html
          echo "<ul>" >> /tmp/release-notes/${SHORT_VERSION}.html
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            ESCAPED=$(echo "$line" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            echo "  <li>${ESCAPED}</li>" >> /tmp/release-notes/${SHORT_VERSION}.html
          done <<< "${{ steps.changes.outputs.commits }}"
          echo "</ul>" >> /tmp/release-notes/${SHORT_VERSION}.html
          echo "</body></html>" >> /tmp/release-notes/${SHORT_VERSION}.html

          # Build the appcast <item> with releaseNotesLink
          cat > /tmp/new_item.xml << ITEM_EOF
              <item>
                <title>Version ${SHORT_VERSION}</title>
                <sparkle:version>${SHORT_VERSION}</sparkle:version>
                <sparkle:shortVersionString>${SHORT_VERSION}</sparkle:shortVersionString>
                <sparkle:releaseNotesLink>${NOTES_URL}</sparkle:releaseNotesLink>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure
                  url="${DMG_URL}"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${LENGTH}"
                  type="application/octet-stream"
                />
              </item>
          ITEM_EOF

      - name: Deploy appcast and release notes to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          SHORT_VERSION="${VERSION#v}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Create appcast if it doesn't exist
          if [ ! -f appcast.xml ]; then
            cat > appcast.xml << 'HEADER'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>PBL Zone Updates</title>
              <language>en</language>
            </channel>
          </rss>
          HEADER
          fi

          # Insert new item before </channel>
          sed -i '' '/<\/channel>/r /tmp/new_item.xml' appcast.xml

          # Copy release notes HTML
          mkdir -p notes
          cp /tmp/release-notes/${SHORT_VERSION}.html notes/

          git add appcast.xml notes/
          git commit -m "Update appcast for ${VERSION}" || true
          git push origin gh-pages
